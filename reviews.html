<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Google Reviews for Luxe Tailoring - Custom website design for small businesses. Read what our clients say about working with us.">
    <title>Google Reviews | Luxe Tailoring - Custom Website Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;1,9..40,200;1,9..40,300;1,9..40,600&family=Newsreader:ital,opsz,wght@0,6..72,200;0,6..72,300;0,6..72,400;1,6..72,200;1,6..72,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>
<body class="bg-[#0C0A09] text-[#FAFAF9] overflow-x-hidden antialiased font-extralight selection:bg-[#E3B04A]/40 selection:text-white" style="font-family: var(--font-serif);">
    
    <!-- Background -->
    <div id="background"></div>

    <!-- Header -->
    <header id="header"></header>

    <!-- Reviews Content -->
    <section class="py-40 px-6 md:px-12 lg:px-24 max-w-[90rem] mx-auto relative z-20">
        <div class="flex flex-col items-center gap-16 fade-in-section">
            <div class="text-center flex flex-col items-center gap-6">
                <h1 class="text-5xl md:text-6xl lg:text-7xl tracking-tight uppercase font-extralight text-transparent bg-clip-text bg-gradient-to-b from-white to-white/50" style="font-family: var(--font-display);">Reviews</h1>
                <p class="text-lg text-white/50 italic font-extralight"><span id="review-count">Real</span> Reviews</p>
            </div>

            <!-- Google Reviews Embed -->
            <div class="w-full max-w-4xl">
                <script src="https://cdn.trustindex.io/libs/5d0f1d2c96d77900131a73d7.js"></script>
            </div>

            <!-- Call to Action -->
            <div class="bg-gradient-to-r from-[#E3B04A]/10 to-[#C05C3B]/10 border border-[#E3B04A]/20 rounded-2xl p-8 md:p-12 w-full max-w-2xl text-center">
                <h3 class="text-2xl md:text-3xl font-semibold text-white mb-4">Had a great experience?</h3>
                <p class="text-white/60 mb-8 text-sm md:text-base">Your review helps other small businesses find us and make the right choice.</p>
                <a href="https://g.page/r/Cd_2hlnrlM1UEBM/review" target="_blank" rel="noopener noreferrer" class="inline-flex px-8 md:px-10 py-4 bg-[#E3B04A] text-[#0C0A09] text-xs uppercase tracking-widest rounded-lg font-semibold hover:bg-[#C05C3B] transition-all duration-300 shadow-[0_0_20px_rgba(227,176,74,0.3)] hover:shadow-[0_0_30px_rgba(192,92,59,0.4)] items-center gap-2">
                    <iconify-icon icon="solar:star-bold" width="18" height="18"></iconify-icon>
                    Leave a Review on Google
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer id="footer"></footer>

    <!-- Scripts -->
    <script src="background.js"></script>
    <script src="header.js"></script>
    <script src="footer.js"></script>
    <script src="main.js"></script>
    <script>
        // Auto-update review count from TrustIndex widget
        function updateReviewCount() {
            // Wait for TrustIndex widget to load
            setTimeout(() => {
                const reviewElements = document.querySelectorAll('[data-review-count], .ti-review');
                let reviewCount = reviewElements.length;
                
                // If no reviews found, try alternate method
                if (reviewCount === 0) {
                    const reviewTexts = document.querySelectorAll('[class*="review"]');
                    reviewCount = reviewTexts.length;
                }
                
                // Update the display
                const countSpan = document.getElementById('review-count');
                if (reviewCount > 0) {
                    countSpan.textContent = reviewCount;
                } else {
                    countSpan.textContent = 'Real';
                }
            }, 2000);
        }
        
        // Run on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', updateReviewCount);
        } else {
            updateReviewCount();
        }
    </script>
</body>
</html>
